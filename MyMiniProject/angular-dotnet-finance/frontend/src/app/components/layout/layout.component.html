<div class="shell">
  <aside class="side">
    <div class="brand">
      <span class="brand-mark">฿</span>
      <div>
        <strong>Ledger</strong>
        <small>รายรับรายจ่าย</small>
      </div>
    </div>
    <nav>
      <a routerLink="/" routerLinkActive="active" [routerLinkActiveOptions]="{ exact: true }">แดชบอร์ด</a>
      <a routerLink="/transactions" routerLinkActive="active">รายการ</a>
      @if (auth.isAdmin()) {
        <a routerLink="/users" routerLinkActive="active">ผู้ใช้</a>
      }
    </nav>
    <div class="side-foot">
      <div class="who">
        <strong>{{ auth.user()?.fullName }}</strong>
        <span>{{ auth.user()?.role === 'admin' ? 'ผู้ดูแล' : 'ผู้ใช้' }}</span>
      </div>
      <button type="button" class="btn ghost" (click)="handleLogout()">ออกจากระบบ</button>
    </div>
  </aside>
  <main class="main">
    <router-outlet />
  </main>
</div>
